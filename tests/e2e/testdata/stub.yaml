apiVersion: apps/v1
kind: Deployment
metadata:
  name: upgrade-stub
  namespace: kubeadapt-system
  labels:
    app: upgrade-stub
    app.kubernetes.io/part-of: kubeadapt-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upgrade-stub
  template:
    metadata:
      labels:
        app: upgrade-stub
        app.kubernetes.io/part-of: kubeadapt-e2e
    spec:
      containers:
      - name: upgrade-stub
        image: localhost/upgrade-stub:e2e-test
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: upgrade-stub
  namespace: kubeadapt-system
  labels:
    app: upgrade-stub
    app.kubernetes.io/part-of: kubeadapt-e2e
spec:
  type: NodePort
  selector:
    app: upgrade-stub
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30082
    protocol: TCP
